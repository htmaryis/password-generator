<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">

        <h1>Gerador de Senhas</h1>

        <img src="https://cdn-icons-png.flaticon.com/512/102/102649.png" alt="Ícone de chaves" class="logo">

        <div class="configuracoes">

            <div class="linha">
                <label for="maiusculas">Letras Maiúsculas</label>
                <input type="checkbox" id="maiuscula">
            </div>

            <div class="linha">
                <label for="minusculas">Letras Minúsculas</label>
                <input type="checkbox" id="minuscula">
            </div>

            <div class="linha">
                <label for="numeros">Números</label>
                <input type="checkbox" id="numeros">
            </div>

            <div class="linha">
                <label for="especiais">Caracteres Especiais</label>
                <input type="checkbox" id="especiais">
            </div>

            <div class="linha">
                <label for="primeiroCaractere">Primeiro caractere</label>

                <select id="primeiroCaractere">
                    <option selected value="aleatorio">Aleatório</option>
                    <option value="maiuscula">Letra Maiúscula</option>
                    <option value="minuscula">Letra Minúscula</option>
                    <option value="numero">Número</option>
                    <option value="especial">Caractere Especial</option>
                </select>
            </div>

            <div class="linha">
                <label for="tamanho">Tamanho da senha</label>

                <select id="tamanho">
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                    <option>11</option>
                    <option >12</option>
                </select>
            </div>

        </div>

        <button id="gerarSenha">
            Gerar Senha
        </button>

        <div id="resultado">
            ************
        </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
